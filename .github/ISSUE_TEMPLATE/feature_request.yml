name: Feature Request
description: Suggest a new feature or improvement for twtGUI
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea?

  - type: textarea
    id: feature
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement clearly.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why would this be useful?
      description: What problem does it solve, or what would it improve? Would this be useful for only you, or for others?
    validations:
      required: true

  - type: dropdown
    id: spec-related
    attributes:
      label: Is this related to a twtxt spec extension?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true

  - type: input
    id: spec-link
    attributes:
      label: If yes, which extension?
      description: Link or name the relevant extension from https://twtxt.dev
      placeholder: "e.g. Twt Hash Extension -- https://twtxt.dev/exts/twt-hash.html"

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Mockups, examples, prior art, etc.
