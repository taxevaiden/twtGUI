name: Build & Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Determine release tag
        id: set-tag
        run: |
          echo "tag=v$(date +'%Y.%m.%d.%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set-tag.outputs.tag }}
          name: Release ${{ steps.set-tag.outputs.tag }}
          body: "Automated build release"
          token: ${{ secrets.RELEASE_TOKEN }}

  build-windows:
    runs-on: windows-latest
    needs: create-release

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MSYS2, libcurl, Qt, and compilers
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel 
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            p7zip

      # - name: Install Qt
      #   uses: jurplel/install-qt-action@v3
      #   with:
      #     aqtversion: '==3.1.*'
      #     version: '6.10.1'
      #     host: 'windows'
      #     target: 'desktop'
      #     arch: 'win64_mingw'
      #     # tools: 'tools_cmake tools_ninja'

      - name: Set reusable strings
        id: strings
        run: |
          echo "build-output-dir=$(pwd)/build" >> "$GITHUB_OUTPUT"
          
      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: |
          cmake -S "${{ github.workspace }}" -B "${{ steps.strings.outputs.build-output-dir }}" -G Ninja -DCMAKE_BUILD_TYPE=Release
          
      - name: Build
        # Build your program with the given configuration.
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }}

      - name: Prepare release dir
        run: |
          mkdir -p release
          cp ${{ steps.strings.outputs.build-output-dir }}/twtGUI.exe release/

      - name: Deploy Qt
        run: |
          windeployqt6 --release --no-translations --no-system-d3d-compiler release/twtGUI.exe

      - name: Copy libcurl
        run: cp /mingw64/bin/libcurl-4.dll release/

      - name: Copy MinGW DLLs
        # List of required MinGW DLLs
        run: |
          MINGW_DLLS=(
            libwinpthread-1.dll
            libcurl-4.dll
            libgcc_s_seh-1.dll
            libstdc++-6.dll
            libmd4c.dll
            libpng16-16.dll
            libfreetype-6.dll
            zlib1.dll
            libharfbuzz-0.dll
            libnghttp3-9.dll
            libngtcp2-16.dll
            libngtcp2_crypto_ossl-0.dll
            libbrotlidec.dll
            libidn2-0.dll
            libb2-1.dll
            libdouble-conversion.dll
            libicuin78.dll
            libicuuc78.dll
            libpcre2-16-0.dll
            libzstd.dll
            libcrypto-3-x64.dll
            libpsl-5.dll
            libnghttp2-14.dll
            libssh2-1.dll
            libbz2-1.dll
            libgraphite2.dll
            libssl-3-x64.dll
            libiconv-2.dll
            libbrotlicommon.dll
            libicudt78.dll
            libintl-8.dll
            libglib-2.0-0.dll
            libunistring-5.dll
            libpcre2-8-0.dll
          )
          for dll in "${MINGW_DLLS[@]}"; do
              cp /mingw64/bin/$dll release/
          done

      - name: Copy other files
        run: |
          cp LICENSE README.md release/

      - name: Create zip
        run: |
          7z a twtGUI-windows-x64.zip release/*

      - name: Upload Windows build to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: "twtGUI-windows-x64.zip"
          token: ${{ secrets.RELEASE_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          aqtversion: '==3.1.*'
          version: '6.10.1'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          tools: 'tools_cmake tools_ninja'

      - name: Install libcurl headers and libraries (Linux)
        run: |
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          
      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: |
          cmake -S "${{ github.workspace }}" -B "${{ steps.strings.outputs.build-output-dir }}" -G Ninja -DCMAKE_BUILD_TYPE=Release
          
      - name: Build
        # Build your program with the given configuration.
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }}

      - name: Upload Linux build to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: "${{ steps.strings.outputs.build-output-dir }}/twtGUI"
          token: ${{ secrets.RELEASE_TOKEN }}